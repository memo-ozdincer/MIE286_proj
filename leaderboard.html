<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — MIE 286</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #FF6B9D;
      --purple: #C084FC;
      --blue: #60A5FA;
      --yellow: #FBBF24;
      --green: #34D399;
      --orange: #FB923C;
      --red: #F87171;
      --dark: #1E1B4B;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #FF6B9D 0%, #C084FC 35%, #60A5FA 70%, #34D399 100%);
      background-attachment: fixed;
      color: var(--dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Floating bubbles ──────────────────────────────────────── */
    #bubbles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0.3); opacity: 0; }
      10%  { opacity: 0.18; }
      85%  { opacity: 0.12; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Container ─────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.2), 0 0 40px rgba(255,255,255,0.15);
      letter-spacing: -0.5px;
    }
    header p {
      font-size: 1.1rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      margin-top: 0.3rem;
    }

    /* ── Loading ───────────────────────────────────────────────── */
    #loading {
      text-align: center;
      color: #fff;
      font-size: 1.3rem;
      font-weight: 600;
      padding: 4rem 0;
      animation: pulse 1.2s ease-in-out infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; } }

    /* ── Podium ────────────────────────────────────────────────── */
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .podium-spot {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      padding: 1.5rem 1.2rem 1.2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 3px rgba(255,255,255,0.5);
      transition: transform 0.2s;
      width: 180px;
    }
    .podium-spot:hover { transform: translateY(-6px) scale(1.03); }
    .podium-spot.gold {
      order: 2;
      padding-top: 2rem;
      padding-bottom: 1.5rem;
      background: linear-gradient(170deg, #FFF7E0, #FFFFFF 40%);
      box-shadow: 0 8px 32px rgba(251,191,36,0.3), 0 0 0 3px var(--yellow);
      min-height: 230px;
    }
    .podium-spot.silver { order: 1; min-height: 200px; }
    .podium-spot.bronze { order: 3; min-height: 180px; }
    .podium-medal { font-size: 2.4rem; margin-bottom: 0.4rem; }
    .gold .podium-medal { font-size: 3rem; }
    .podium-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      text-align: center;
      word-break: break-word;
    }
    .podium-score {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 0.3rem;
    }
    .gold .podium-score { color: #D97706; }
    .silver .podium-score { color: #6B7280; }
    .bronze .podium-score { color: #B45309; }
    .podium-sub {
      font-size: 0.75rem;
      font-weight: 500;
      color: #9CA3AF;
      margin-top: 0.15rem;
    }

    /* ── Awards ────────────────────────────────────────────────── */
    .awards-title {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      margin-bottom: 1rem;
    }
    .awards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .award-card {
      background: rgba(255,255,255,0.92);
      border-radius: 20px;
      padding: 1.2rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 3px solid transparent;
    }
    .award-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    .award-card.speed   { border-color: var(--yellow); }
    .award-card.accuracy { border-color: var(--green); }
    .award-card.streak  { border-color: var(--orange); }
    .award-card.ice     { border-color: var(--blue); }
    .award-card.sniper  { border-color: var(--purple); }
    .award-card.quick   { border-color: var(--red); }
    .award-card.orange  { border-color: var(--orange); }
    .award-card.red     { border-color: var(--red); }
    .award-card.green   { border-color: var(--green); }

    .award-emoji { font-size: 2rem; margin-bottom: 0.3rem; }
    .award-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9CA3AF;
    }
    .award-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--dark);
      margin: 0.2rem 0;
    }
    .award-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: #6B7280;
    }

    /* ── Rankings table ────────────────────────────────────────── */
    .rankings-title {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
      margin-bottom: 1rem;
    }
    .rankings-card {
      background: rgba(255,255,255,0.92);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: rgba(0,0,0,0.04);
      padding: 0.5rem;
      gap: 0.35rem;
      overflow-x: auto;
    }
    .tab {
      flex: 1;
      padding: 0.6rem 0.5rem;
      border: none;
      background: transparent;
      border-radius: 12px;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: #6B7280;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab:hover { background: rgba(255,255,255,0.6); color: var(--dark); }
    .tab.active {
      background: #fff;
      color: var(--dark);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    /* Table */
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table th {
      text-align: left;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9CA3AF;
      padding: 0.8rem 1rem 0.5rem;
      border-bottom: 2px solid #F3F4F6;
    }
    .rank-table td {
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      border-bottom: 1px solid #F3F4F6;
    }
    .rank-table tr:last-child td { border-bottom: none; }
    .rank-table tr:hover td { background: rgba(192, 132, 252, 0.06); }

    .rank-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
    }
    .rank-1 { background: linear-gradient(135deg, #FBBF24, #F59E0B); }
    .rank-2 { background: linear-gradient(135deg, #D1D5DB, #9CA3AF); }
    .rank-3 { background: linear-gradient(135deg, #FDBA74, #F97316); }
    .rank-n { background: #E5E7EB; color: #6B7280; }

    .player-name { font-weight: 600; }
    .val-primary { font-weight: 700; color: var(--dark); }
    .val-secondary { font-weight: 500; color: #9CA3AF; font-size: 0.8rem; }

    .condition-tag {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .condition-tag.va { background: #EDE9FE; color: #7C3AED; }
    .condition-tag.av { background: #DBEAFE; color: #2563EB; }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 640px) {
      header h1 { font-size: 2rem; }
      .podium { gap: 0.5rem; }
      .podium-spot { width: 110px; padding: 1rem 0.8rem; border-radius: 18px; }
      .podium-spot.gold { min-height: 180px; }
      .podium-name { font-size: 0.9rem; }
      .podium-score { font-size: 1.2rem; }
      .tabs { padding: 0.35rem; }
      .tab { font-size: 0.72rem; padding: 0.5rem 0.3rem; }
      .rank-table th, .rank-table td { padding: 0.5rem 0.6rem; }
    }
  </style>
</head>
<body>
  <div id="bubbles"></div>

  <div class="container">
    <header>
      <h1>🏆 Leaderboard 🏆</h1>
      <p>MIE 286 Speed-Accuracy Challenge</p>
    </header>

    <div id="loading">Loading scores...</div>

    <div id="content" style="display:none">
      <div id="podium-section"></div>
      <div id="awards-section"></div>
      <div id="rankings-section"></div>
    </div>
  </div>

<script>
// ── Bubbles ────────────────────────────────────────────────────
(function createBubbles() {
  const container = document.getElementById('bubbles');
  const colors = ['#FF6B9D','#C084FC','#60A5FA','#FBBF24','#34D399','#FB923C','#F87171'];
  for (let i = 0; i < 20; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 20 + Math.random() * 60;
    b.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${8+Math.random()*12}s;
      animation-delay:${Math.random()*10}s;
    `;
    container.appendChild(b);
  }
})();

// ── Data loading ───────────────────────────────────────────────
async function loadLeaderboard() {
  const resp = await fetch('https://api.github.com/repos/memo-ozdincer/MIE286_proj/contents/data');
  const files = await resp.json();

  const participants = [];

  for (const file of files) {
    if (!file.name.endsWith('.csv')) continue;

    const csv = await (await fetch(file.download_url)).text();
    const lines = csv.trim().split('\n');
    if (lines.length < 2) continue;

    const headers = lines[0].split(',');
    const rows = lines.slice(1).map(line => {
      const vals = line.split(',');
      const obj = {};
      headers.forEach((h, i) => obj[h.trim()] = vals[i]);
      return obj;
    });

    if (rows.length === 0) continue;

    const name = rows[0].participant_id;
    const order = rows[0].condition_order;
    const rts = rows.map(r => parseFloat(r.reaction_time_ms));
    const errors = rows.map(r => parseFloat(r.radial_error));
    const hits = rows.map(r => parseInt(r.is_hit));

    const avgRT = rts.reduce((a, b) => a + b, 0) / rts.length;
    const hitRate = hits.reduce((a, b) => a + b, 0) / hits.length * 100;
    const avgError = errors.reduce((a, b) => a + b, 0) / errors.length;
    const fastestRT = Math.min(...rts);
    const rtMean = avgRT;
    const rtStdDev = Math.sqrt(rts.reduce((s, v) => s + (v - rtMean) ** 2, 0) / rts.length);

    // Best hit streak
    let maxStreak = 0, streak = 0;
    for (const h of hits) {
      if (h) { streak++; maxStreak = Math.max(maxStreak, streak); }
      else streak = 0;
    }

    // Lowest single-hit error
    let bestError = Infinity;
    for (let i = 0; i < rows.length; i++) {
      if (hits[i] && errors[i] < bestError) bestError = errors[i];
    }

    // One-taps (hits under 300ms)
    let oneClicks = 0;
    for (let i = 0; i < rows.length; i++) {
      if (hits[i] && rts[i] < 300) oneClicks++;
    }

    // Recoveries (hit right after a miss)
    let recoveries = 0;
    for (let i = 1; i < rows.length; i++) {
      if (!hits[i - 1] && hits[i]) recoveries++;
    }

    // Reconstruct score (matches in-game formula)
    let score = 0, sStreak = 0;
    for (let i = 0; i < rows.length; i++) {
      if (hits[i]) {
        let pts = 100;
        pts += Math.round(Math.max(0, 1 - rts[i] / 2000) * 150);
        pts += Math.round(Math.max(0, 1 - errors[i] / 35) * 75);
        sStreak++;
        let m = 1;
        if (sStreak >= 12) m = 2;
        else if (sStreak >= 8) m = 1.75;
        else if (sStreak >= 5) m = 1.5;
        else if (sStreak >= 3) m = 1.25;
        score += Math.round(pts * m);
      } else { sStreak = 0; }
    }

    participants.push({
      name, order, avgRT, hitRate, avgError, fastestRT,
      rtStdDev, maxStreak, bestError, score, trials: rows.length,
      oneClicks, recoveries,
    });
  }

  return participants;
}

// ── Rendering ──────────────────────────────────────────────────
function render(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // Sort by score descending
  const byScore = [...data].sort((a, b) => b.score - a.score);

  renderPodium(byScore);
  renderAwards(data);
  renderRankings(data, byScore);
}

function renderPodium(sorted) {
  const top3 = sorted.slice(0, 3);
  const medals = ['🥇','🥈','🥉'];
  const classes = ['gold','silver','bronze'];

  let html = '<div class="podium">';
  for (let i = 0; i < Math.min(3, top3.length); i++) {
    const p = top3[i];
    html += `
      <div class="podium-spot ${classes[i]}">
        <div class="podium-medal">${medals[i]}</div>
        <div class="podium-name">${esc(p.name)}</div>
        <div class="podium-score">${p.score.toLocaleString()}</div>
        <div class="podium-sub">${p.hitRate.toFixed(0)}% accuracy &middot; ${p.avgRT.toFixed(0)}ms</div>
      </div>`;
  }
  html += '</div>';
  document.getElementById('podium-section').innerHTML = html;
}

function renderAwards(data) {
  const awards = [
    {
      emoji: '⚡', label: 'Speed Demon', cls: 'speed',
      pick: d => [...d].sort((a, b) => a.avgRT - b.avgRT)[0],
      fmt: p => `${p.avgRT.toFixed(0)}ms avg`,
    },
    {
      emoji: '🎯', label: 'Sharpshooter', cls: 'accuracy',
      pick: d => [...d].sort((a, b) => b.hitRate - a.hitRate)[0],
      fmt: p => `${p.hitRate.toFixed(1)}% hits`,
    },
    {
      emoji: '🔥', label: 'Hot Streak', cls: 'streak',
      pick: d => [...d].sort((a, b) => b.maxStreak - a.maxStreak)[0],
      fmt: p => `${p.maxStreak} in a row`,
    },
    {
      emoji: '🧊', label: 'Ice Cold', cls: 'ice',
      pick: d => [...d].sort((a, b) => a.rtStdDev - b.rtStdDev)[0],
      fmt: p => `\u03C3 = ${p.rtStdDev.toFixed(0)}ms`,
    },
    {
      emoji: '💎', label: 'Bullseye', cls: 'sniper',
      pick: d => [...d].filter(p => p.bestError < Infinity).sort((a, b) => a.bestError - b.bestError)[0],
      fmt: p => `${p.bestError.toFixed(1)}px closest`,
    },
    {
      emoji: '💨', label: 'Quick Draw', cls: 'quick',
      pick: d => [...d].sort((a, b) => a.fastestRT - b.fastestRT)[0],
      fmt: p => `${p.fastestRT.toFixed(0)}ms fastest`,
    },
    {
      emoji: '🐌', label: 'Scenic Route', cls: 'speed',
      pick: d => [...d].sort((a, b) => b.avgRT - a.avgRT)[0],
      fmt: p => `${p.avgRT.toFixed(0)}ms avg... chill`,
    },
    {
      emoji: '🎰', label: 'Spray & Pray', cls: 'streak',
      pick: d => [...d].sort((a, b) => a.hitRate - b.hitRate)[0],
      fmt: p => `${p.hitRate.toFixed(1)}% hit rate`,
    },
    {
      emoji: '🎢', label: 'Wild Card', cls: 'orange',
      pick: d => [...d].sort((a, b) => b.rtStdDev - a.rtStdDev)[0],
      fmt: p => `\u03C3 = ${p.rtStdDev.toFixed(0)}ms variance`,
    },
    {
      emoji: '🤖', label: 'The Machine', cls: 'ice',
      pick: d => { const s = [...d].sort((a, b) => b.hitRate - a.hitRate); return s.find(p => p.rtStdDev < 120) || s[0]; },
      fmt: p => `${p.hitRate.toFixed(0)}% @ \u03C3${p.rtStdDev.toFixed(0)}ms`,
    },
    {
      emoji: '💀', label: 'One Tap', cls: 'red',
      pick: d => {
        let best = null, bestCount = 0;
        for (const p of d) { if (p.oneClicks > bestCount) { best = p; bestCount = p.oneClicks; } }
        return best || d[0];
      },
      fmt: p => `${p.oneClicks || 0} clicks under 300ms`,
    },
    {
      emoji: '🧱', label: 'Unbreakable', cls: 'green',
      pick: d => {
        let best = null, bestRec = 0;
        for (const p of d) { if (p.recoveries > bestRec) { best = p; bestRec = p.recoveries; } }
        return best || d[0];
      },
      fmt: p => `${p.recoveries || 0} hits right after a miss`,
    },
  ];

  let html = '<div class="awards-title">✨ Special Awards ✨</div><div class="awards-grid">';
  for (const a of awards) {
    const p = a.pick(data);
    if (!p) continue;
    html += `
      <div class="award-card ${a.cls}">
        <div class="award-emoji">${a.emoji}</div>
        <div class="award-label">${a.label}</div>
        <div class="award-name">${esc(p.name)}</div>
        <div class="award-value">${a.fmt(p)}</div>
      </div>`;
  }
  html += '</div>';
  document.getElementById('awards-section').innerHTML = html;
}

function renderRankings(data, byScore) {
  const sorts = {
    score:     { data: byScore, cols: ['Score','Accuracy','Avg RT'], fmt: p => [p.score.toLocaleString(), p.hitRate.toFixed(1)+'%', p.avgRT.toFixed(0)+'ms'] },
    speed:     { data: [...data].sort((a,b) => a.avgRT - b.avgRT), cols: ['Avg RT','Fastest','Accuracy'], fmt: p => [p.avgRT.toFixed(0)+'ms', p.fastestRT.toFixed(0)+'ms', p.hitRate.toFixed(1)+'%'] },
    accuracy:  { data: [...data].sort((a,b) => b.hitRate - a.hitRate), cols: ['Hit Rate','Avg Error','Avg RT'], fmt: p => [p.hitRate.toFixed(1)+'%', p.avgError.toFixed(1)+'px', p.avgRT.toFixed(0)+'ms'] },
    precision: { data: [...data].sort((a,b) => a.avgError - b.avgError), cols: ['Avg Error','Best Shot','Hit Rate'], fmt: p => [p.avgError.toFixed(1)+'px', p.bestError.toFixed(1)+'px', p.hitRate.toFixed(1)+'%'] },
    streaks:   { data: [...data].sort((a,b) => b.maxStreak - a.maxStreak), cols: ['Best Streak','Consistency','Score'], fmt: p => [p.maxStreak+'', '\u03C3 '+p.rtStdDev.toFixed(0)+'ms', p.score.toLocaleString()] },
  };

  const tabNames = { score:'Overall', speed:'Speed', accuracy:'Accuracy', precision:'Precision', streaks:'Streaks' };

  let tabs = '<div class="tabs">';
  for (const key of Object.keys(sorts)) {
    tabs += `<button class="tab${key==='score'?' active':''}" data-sort="${key}">${tabNames[key]}</button>`;
  }
  tabs += '</div>';

  let html = `
    <div class="rankings-title">📊 Full Rankings 📊</div>
    <div class="rankings-card">
      ${tabs}
      <div id="rank-table-wrap"></div>
    </div>`;

  document.getElementById('rankings-section').innerHTML = html;

  // Tab switching
  function showSort(key) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.sort === key));
    const s = sorts[key];
    let table = `<table class="rank-table"><thead><tr>
      <th>#</th><th>Player</th><th>Order</th>
      <th>${s.cols[0]}</th><th>${s.cols[1]}</th><th>${s.cols[2]}</th>
    </tr></thead><tbody>`;

    s.data.forEach((p, i) => {
      const rank = i + 1;
      const cls = rank <= 3 ? `rank-${rank}` : 'rank-n';
      const vals = s.fmt(p);
      const orderTag = p.order === 'VA'
        ? '<span class="condition-tag va">V→A</span>'
        : '<span class="condition-tag av">A→V</span>';
      table += `<tr>
        <td><span class="rank-num ${cls}">${rank}</span></td>
        <td class="player-name">${esc(p.name)}</td>
        <td>${orderTag}</td>
        <td class="val-primary">${vals[0]}</td>
        <td class="val-secondary">${vals[1]}</td>
        <td class="val-secondary">${vals[2]}</td>
      </tr>`;
    });
    table += '</tbody></table>';
    document.getElementById('rank-table-wrap').innerHTML = table;
  }

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => showSort(t.dataset.sort));
  });
  showSort('score');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Init ───────────────────────────────────────────────────────
loadLeaderboard().then(render).catch(err => {
  document.getElementById('loading').textContent = 'Failed to load — try refreshing.';
  console.error(err);
});
</script>
</body>
</html>
